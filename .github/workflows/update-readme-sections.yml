name: Update README Sections

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/featured_projects.json"
      - "data/open_source_projects.json"
      - "scripts/generate_sections.py"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    name: Generate Featured Projects & Open Source sections

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate README sections
        run: python3 scripts/generate_sections.py

      - name: Commit and push updated README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update featured projects & open source sections [skip ci]"
          git pull --rebase origin main
          git push