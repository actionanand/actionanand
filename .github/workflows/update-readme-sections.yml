name: Update README Sections

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/profile.json"
      - "data/tech_stack.json"
      - "data/social_links.json"
      - "data/featured_projects.json"
      - "data/open_source_projects.json"
      - "scripts/generate_sections.py"

concurrency:
  group: readme-push
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    name: Generate README sections

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate README sections
        run: python3 scripts/generate_sections.py

      - name: Commit and push updated README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          # Retry loop: pull rebase THEN commit THEN push to avoid stale ref
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            # Reset staged changes, pull latest, re-stage, commit, push
            git reset HEAD README.md
            git stash
            git pull --rebase origin main
            git stash pop
            git add README.md
            git diff --staged --quiet && echo "No changes after rebase" && exit 0
            git commit -m "chore: update README sections [skip ci]"
            git push && echo "✅ Push succeeded on attempt $i" && exit 0
            echo "⚠️  Attempt $i failed, retrying in $((i * 3))s..."
            git reset --soft HEAD~1
            sleep $((i * 3))
          done

          echo "❌ Push failed after 5 attempts"
          exit 1