name: GitHub Profile Summary Cards

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "profile-summary-card-output/**"
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Summary Cards
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: tokyonight
        with:
          USERNAME: actionanand
          AUTO_PUSH: false

      - name: Push cards to cards-output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: cards-output
          build_dir: profile-summary-card-output
          keep_history: true
          commit_message: "chore: update profile summary cards [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}