name: Stack Overflow Stats

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC

jobs:
  fetch-stackoverflow-stats:
    runs-on: ubuntu-latest
    name: Fetch Stack Overflow Stats

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch stats from Stack Exchange API
        run: |
          # Reputation from /users endpoint
          USER_RESP=$(curl -s --compressed "https://api.stackexchange.com/2.3/users/10907720?site=stackoverflow")
          echo "User response: $USER_RESP"
          REPUTATION=$(echo "$USER_RESP" | jq '.items[0].reputation')

          # Total questions: use pagesize=1 and read .total from /users/{id}/questions
          Q_RESP=$(curl -s --compressed "https://api.stackexchange.com/2.3/users/10907720/questions?site=stackoverflow&pagesize=1&filter=total")
          echo "Questions response: $Q_RESP"
          QUESTION_COUNT=$(echo "$Q_RESP" | jq '.total')

          # Total answers: same trick with /users/{id}/answers
          A_RESP=$(curl -s --compressed "https://api.stackexchange.com/2.3/users/10907720/answers?site=stackoverflow&pagesize=1&filter=total")
          echo "Answers response: $A_RESP"
          ANSWER_COUNT=$(echo "$A_RESP" | jq '.total')

          echo "Reputation   : $REPUTATION"
          echo "Questions    : $QUESTION_COUNT"
          echo "Answers      : $ANSWER_COUNT"

          # Fail fast if any value is null
          if [ "$REPUTATION" = "null" ] || [ "$QUESTION_COUNT" = "null" ] || [ "$ANSWER_COUNT" = "null" ]; then
            echo "❌ One or more fields missing from API response. Aborting."
            exit 1
          fi

          cat > stackoverflow-stats.json << ENDJSON
          {
            "question_count": $QUESTION_COUNT,
            "answer_count": $ANSWER_COUNT,
            "reputation": $REPUTATION
          }
          ENDJSON

          echo "Generated stackoverflow-stats.json:"
          cat stackoverflow-stats.json

      - name: Commit and push stackoverflow-stats.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stackoverflow-stats.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update stackoverflow stats [skip ci]"
          git pull --rebase origin main
          git push