name: Stack Overflow Stats

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC

jobs:
  fetch-stackoverflow-stats:
    runs-on: ubuntu-latest
    name: Fetch Stack Overflow Stats

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch stats from Stack Exchange API
        run: |
          # filter=!nNPvSNdD4U explicitly includes question_count & answer_count
          RESPONSE=$(curl -s "https://api.stackexchange.com/2.3/users/10907720?site=stackoverflow&filter=!nNPvSNdD4U")

          echo "Raw API response:"
          echo "$RESPONSE"

          # jq is pre-installed on ubuntu-latest runners
          REPUTATION=$(echo "$RESPONSE"     | jq '.items[0].reputation')
          QUESTION_COUNT=$(echo "$RESPONSE" | jq '.items[0].question_count')
          ANSWER_COUNT=$(echo "$RESPONSE"   | jq '.items[0].answer_count')

          echo "Reputation   : $REPUTATION"
          echo "Questions    : $QUESTION_COUNT"
          echo "Answers      : $ANSWER_COUNT"

          # Fail fast if any value is null (rate-limited or API changed)
          if [ "$REPUTATION" = "null" ] || [ "$QUESTION_COUNT" = "null" ] || [ "$ANSWER_COUNT" = "null" ]; then
            echo "❌ One or more fields missing from API response. Aborting."
            exit 1
          fi

          cat > stackoverflow-stats.json << ENDJSON
          {
            "question_count": $QUESTION_COUNT,
            "answer_count": $ANSWER_COUNT,
            "reputation": $REPUTATION
          }
          ENDJSON

          echo "Generated stackoverflow-stats.json:"
          cat stackoverflow-stats.json

      - name: Commit and push stackoverflow-stats.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stackoverflow-stats.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update stackoverflow stats [skip ci]"
          git pull --rebase origin main
          git push